<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0f" />
<title>Delay Calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.22);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --hint: rgba(240,240,245,0.25);
    --accent: #4f8fff;
    --accent-dim: rgba(79,143,255,0.12);
    --accent-dim2: rgba(79,143,255,0.22);
    --danger: #ff5c5c;
    --danger-dim: rgba(255,92,92,0.12);
    --success: #3ecf8e;
    --success-dim: rgba(62,207,142,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --radius: 14px;
    --radius-sm: 8px;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: env(safe-area-inset-top, 0) 20px 0;
    padding-top: calc(env(safe-area-inset-top, 0px) + 18px);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 36px;
    height: 36px;
    background: var(--accent-dim2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .header-text h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1;
  }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  /* Main scroll area */
  .main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 16px calc(env(safe-area-inset-bottom, 0px) + 100px);
  }

  /* Section label */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--hint);
    text-transform: uppercase;
    margin: 24px 0 10px 4px;
  }
  .section-label:first-child { margin-top: 8px; }

  /* Field card pairs */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 12px;
    cursor: text;
    transition: border-color 0.15s;
    position: relative;
  }

  .field:focus-within {
    border-color: var(--border-active);
    background: var(--surface2);
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .field-code {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }

  .field input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    padding: 0;
    caret-color: var(--accent);
    -webkit-appearance: none;
    appearance: none;
  }

  .field input::placeholder {
    color: var(--hint);
    font-size: 16px;
    font-style: italic;
  }

  /* Turnaround full width */
  .field-full {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color 0.15s;
    margin-bottom: 8px;
  }
  .field-full:focus-within { border-color: var(--border-active); background: var(--surface2); }

  .field-full-label { flex: 1; }
  .field-full-label .field-label { margin-bottom: 2px; }
  .field-full-label .field-code { font-size: 13px; color: var(--muted); font-weight: 500; }

  .field-full input {
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    width: 80px;
    text-align: right;
    caret-color: var(--accent);
    -webkit-appearance: none;
    appearance: none;
  }
  .field-full input::placeholder { color: var(--hint); font-size: 18px; font-style: italic; }
  .field-full .unit { font-family: var(--mono); font-size: 11px; color: var(--hint); margin-left: 4px; align-self: flex-end; padding-bottom: 4px; }

  /* CTA button — fixed bottom */
  .btn-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 12px);
    background: linear-gradient(to top, var(--bg) 70%, transparent);
  }

  .btn {
    width: 100%;
    height: 56px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { opacity: 0.85; transform: scale(0.98); }
  .btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Error */
  .error-box {
    background: var(--danger-dim);
    border: 1px solid rgba(255,92,92,0.25);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 8px;
    display: none;
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-hero {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .result-hero-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .result-hero-value {
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .result-hero-value.delay { color: var(--danger); }
  .result-hero-value.ontime { color: var(--success); font-size: 28px; }

  .result-hero-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .result-rows { padding: 4px 0; }

  .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .result-row:last-child { border-bottom: none; }

  .result-row-left { flex: 1; min-width: 0; }

  .result-row-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .result-row-note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--hint);
    margin-top: 4px;
    line-height: 1.5;
  }

  .result-row-value {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    flex-shrink: 0;
    text-align: right;
  }
  .result-row-value.accent { color: var(--accent); }
  .result-row-value.danger { color: var(--danger); }
  .result-row-value.success { color: var(--success); }
  .result-row-value.muted { color: var(--muted); font-size: 14px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .badge-yes { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,92,92,0.2); }
  .badge-no  { background: var(--success-dim); color: var(--success); border: 1px solid rgba(62,207,142,0.2); }

  /* divider row */
  .result-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--hint);
    text-transform: uppercase;
    padding: 10px 20px 4px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  /* Clear button */
  .clear-btn {
    width: 100%;
    margin-top: 10px;
    height: 44px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--display);
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    display: none;
  }
  .clear-btn:active { color: var(--text); border-color: var(--border-active); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
  </div>
  <div class="header-text">
    <h1>Delay Calc</h1>
    <p>Gate agent · turnaround tool</p>
  </div>
</div>

<div class="main" id="main">

  <div class="section-label">Arrival</div>
  <div class="field-row">
    <div class="field">
      <span class="field-label">scheduled</span>
      <span class="field-code">SIBT</span>
      <input type="text" id="sibt" inputmode="numeric" placeholder="e.g. 14:00" maxlength="5" autocomplete="off" />
    </div>
    <div class="field">
      <span class="field-label">actual</span>
      <span class="field-code">AIBT</span>
      <input type="text" id="aibt" inputmode="numeric" placeholder="e.g. 13:55" maxlength="5" autocomplete="off" />
    </div>
  </div>

  <div class="section-label">Departure</div>
  <div class="field-row">
    <div class="field">
      <span class="field-label">scheduled</span>
      <span class="field-code">SOBT</span>
      <input type="text" id="sobt" inputmode="numeric" placeholder="e.g. 15:00" maxlength="5" autocomplete="off" />
    </div>
    <div class="field">
      <span class="field-label">actual</span>
      <span class="field-code">AOBT</span>
      <input type="text" id="aobt" inputmode="numeric" placeholder="e.g. 15:08" maxlength="5" autocomplete="off" />
    </div>
  </div>

  <div class="section-label">Turnaround</div>
  <div class="field-full" id="mtt-field">
    <div class="field-full-label">
      <span class="field-label">minimum turnaround time</span>
      <span class="field-code">MTT</span>
    </div>
    <input type="text" id="mtt" inputmode="numeric" placeholder="e.g. 55" maxlength="3" autocomplete="off" />
    <span class="unit">min</span>
  </div>

  <div class="error-box" id="error"></div>

  <div class="section-label" id="result-label" style="display:none;">Result</div>
  <div class="result-card" id="result"></div>
  <button class="clear-btn" id="clear-btn" onclick="clearAll()">Clear all fields</button>

</div>

<div class="btn-wrap">
  <button class="btn" onclick="calculate()">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Calculate delay
  </button>
</div>

<script>
function toMins(str) {
  const m = str.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h > 23 || min > 59) return null;
  return h * 60 + min;
}

function fmt(mins) {
  const abs = Math.abs(mins);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  if (h === 0) return m + ' min';
  return h + 'h ' + (m > 0 ? m + 'min' : '');
}

function fmtTime(mins) {
  const w = ((mins % 1440) + 1440) % 1440;
  return String(Math.floor(w / 60)).padStart(2,'0') + ':' + String(w % 60).padStart(2,'0');
}

function autoColon(el) {
  el.addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
    this.value = v;
  });
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); calculate(); }
  });
}

['sibt','aibt','sobt','aobt'].forEach(id => autoColon(document.getElementById(id)));
document.getElementById('mtt').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g,'');
});
document.getElementById('mtt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); calculate(); }
});

function resolveTime(t, ref) {
  return [t-1440, t, t+1440].reduce((b,c) => Math.abs(c-ref) < Math.abs(b-ref) ? c : b);
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function calculate() {
  document.getElementById('error').style.display = 'none';
  const resCard = document.getElementById('result');
  const resLabel = document.getElementById('result-label');
  const clearBtn = document.getElementById('clear-btn');
  resCard.style.display = 'none';
  resLabel.style.display = 'none';
  clearBtn.style.display = 'none';

  const sibtV = toMins(document.getElementById('sibt').value);
  const aibtV = toMins(document.getElementById('aibt').value);
  const sobtV = toMins(document.getElementById('sobt').value);
  const aobtV = toMins(document.getElementById('aobt').value);
  const mtt   = parseInt(document.getElementById('mtt').value.replace(/\D/g,''));

  if ([sibtV,aibtV,sobtV,aobtV].includes(null) || isNaN(mtt) || mtt < 1) {
    showError('Please fill in all four times (HH:MM) and a turnaround time.');
    return;
  }

  const sobt = sobtV;
  const aobt = resolveTime(aobtV, sobt);
  const sibt = resolveTime(sibtV, sobt - mtt);
  const aibt = resolveTime(aibtV, sibt);

  const totalDelay = aobt - sobt;
  const earliestPush = aibt + mtt;
  const code93 = Math.max(0, earliestPush - sobt);
  const remaining = Math.max(0, totalDelay - code93);

  let html = '';

  if (totalDelay <= 0) {
    html = `
      <div class="result-hero">
        <div class="result-hero-label">Total delay</div>
        <div class="result-hero-value ontime">On time</div>
        <div class="result-hero-sub">SOBT ${fmtTime(sobt)} · AOBT ${fmtTime(aobt)}</div>
      </div>`;
  } else {
    html = `
      <div class="result-hero">
        <div class="result-hero-label">Total delay</div>
        <div class="result-hero-value delay">${fmt(totalDelay)}</div>
        <div class="result-hero-sub">SOBT ${fmtTime(sobt)} → AOBT ${fmtTime(aobt)}</div>
      </div>
      <div class="result-rows">
        <div class="result-section-label">Breakdown</div>`;

    if (code93 > 0) {
      html += `
        <div class="result-row">
          <div class="result-row-left">
            <div class="result-row-title">Code 93 <span class="badge badge-yes">YES</span></div>
            <div class="result-row-note">AIBT ${fmtTime(aibt)} + ${mtt} min MTT = ${fmtTime(earliestPush)}<br>${fmt(code93)} past SOBT ${fmtTime(sobt)}</div>
          </div>
          <div class="result-row-value accent">${fmt(code93)}</div>
        </div>`;
    } else {
      html += `
        <div class="result-row">
          <div class="result-row-left">
            <div class="result-row-title">Code 93 <span class="badge badge-no">NO</span></div>
            <div class="result-row-note">AIBT ${fmtTime(aibt)} + ${mtt} min = ${fmtTime(earliestPush)}<br>did not push past SOBT ${fmtTime(sobt)}</div>
          </div>
          <div class="result-row-value success">0 min</div>
        </div>`;
    }

    if (remaining > 0) {
      html += `
        <div class="result-row">
          <div class="result-row-left">
            <div class="result-row-title">Remaining delay</div>
            <div class="result-row-note">Assign your own delay code</div>
          </div>
          <div class="result-row-value danger">${fmt(remaining)}</div>
        </div>`;
    } else {
      html += `
        <div class="result-row">
          <div class="result-row-left">
            <div class="result-row-title">Remaining delay</div>
            <div class="result-row-note">Fully covered by code 93</div>
          </div>
          <div class="result-row-value success">0 min</div>
        </div>`;
    }

    html += `</div>`;
  }

  resCard.innerHTML = html;
  resCard.style.display = 'block';
  resLabel.style.display = 'block';
  clearBtn.style.display = 'block';

  setTimeout(() => {
    resCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function clearAll() {
  ['sibt','aibt','sobt','aobt','mtt'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('result-label').style.display = 'none';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('sibt').focus();
}
</script>
</body>
</html>
